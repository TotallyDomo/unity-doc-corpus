name: gitleaks

# Secret scanning over the committed history. fetch-depth 0 gives the action
# the full history to scan. No GITLEAKS_LICENSE is set on purpose: a license
# key is only required for repositories owned by an Organization account, not
# a personal account (gitleaks-action EULA).
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
